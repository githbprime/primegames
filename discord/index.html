<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discourse | Prime Server</title>
    <style>
        /* CORE LAYOUT */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; background-color: #313338; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* SIDEBARS */
        .server-bar { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        
        /* SQUIRCLE HOVER FIX */
        .server-icon { 
            width: 48px; height: 48px; border-radius: 50%; overflow: hidden; display: flex; 
            align-items: center; justify-content: center; background: #2b2d31; cursor: pointer;
            transition: border-radius 0.2s ease, transform 0.1s ease;
        }
        .server-icon:hover { border-radius: 15px; transform: scale(1.05); }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .channel-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 15px; color: white; font-weight: bold; border-bottom: 1px solid #1e1f22; font-size: 15px; }
        .channel-list { padding: 10px; flex-grow: 1; }
        
        .channel-item { padding: 8px 10px; border-radius: 4px; color: #949ba4; font-size: 15px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; }
        .channel-item:before { content: "#"; margin-right: 8px; font-size: 20px; color: #5f636a; }
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-item.active { background: #3f4147; color: white; }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #313338; }
        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
        .message { display: flex; gap: 16px; align-items: flex-start; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #4e5058; flex-shrink: 0; }
        .msg-content { display: flex; flex-direction: column; }
        .username { color: #f2f3f5; font-weight: 500; font-size: 16px; }
        .timestamp { color: #949ba4; font-size: 12px; margin-left: 8px; }
        .text { color: #dbdee1; font-size: 15px; line-height: 1.3; white-space: pre-wrap; }
        
        .chat-input-wrapper { padding: 0 16px 24px; }
        .chat-input { background: #383a40; padding: 12px 16px; border-radius: 8px; color: #dcddde; font-size: 15px; border: none; width: calc(100% - 32px); outline: none; }

        /* NEW: MEMBERS SIDEBAR */
        .members-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; border-left: 1px solid #1e1f22; }
        .members-header { padding: 15px; color: white; font-weight: bold; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #1e1f22; }
        .members-list { padding: 10px; flex-grow: 1; overflow-y: auto; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; color: #949ba4; font-size: 15px; }
        .member-item:hover { background: #35373c; color: #dbdee1; cursor: pointer; }
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: #4e5058; }
        .member-name { font-weight: 500; }
        .owner-crown { margin-left: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="server-bar">
        <div class="server-icon">
            <img src="fvicon.png" onerror="this.src='../fvicon.png'" alt="Prime Logo">
        </div>
    </div>
    
    <div class="channel-bar">
        <div class="channel-header">Prime Server</div>
        <div class="channel-list">
            <div class="channel-item" data-channel="general">general</div>
            <div class="channel-item active" data-channel="welcome">welcome</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="message-container">
            <div style="color: #949ba4; text-align: center; margin-top: 20px;">Loading...</div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="chat-box" placeholder="Message #welcome">
        </div>
    </div>

    <div class="members-bar">
        <div class="members-header">Online - <span id="online-count">0</span></div>
        <div class="members-list" id="members-container">
            <div style="color: #949ba4; font-size: 13px; text-align: center;">Connecting...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentChannel = 'welcome'; 
    const container = document.getElementById('message-container');
    const input = document.getElementById('chat-box');
    input.placeholder = `Message #${currentChannel}`;

    // USERNAME LOGIC
    let myUsername = localStorage.getItem('discordGuestName');
    if (!myUsername) {
        let chosenName = prompt("Welcome to the server! What username would you like?") || "Guest";
        let hash = Math.floor(1000 + Math.random() * 9000);
        myUsername = `${chosenName}#${hash}`;
        localStorage.setItem('discordGuestName', myUsername);
    }

    function formatTime(dateString) {
        if (!dateString) return "Just now";
        const date = new Date(dateString);
        return date.toLocaleDateString() + " " + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // UPDATED: ADD CROWN TO CHAT MESSAGES
    function addMessageToScreen(user, text, timestamp) {
        if (container.innerText.includes("Loading") || container.innerText.includes("No messages")) {
            container.innerHTML = '';
        }
        const timeDisplay = formatTime(timestamp);
        
        // Check if user is the admin to add crown and gold color
        const crown = user === 'githbprime#3932' ? '<span class="owner-crown">👑</span>' : '';
        const nameColor = user === 'githbprime#3932' ? 'color: #ffcc00;' : '';

        const html = `
            <div class="message">
                <div class="avatar"></div>
                <div class="msg-content">
                    <div><span class="username" style="${nameColor}">${user}${crown}</span><span class="timestamp">${timeDisplay}</span></div>
                    <div class="text">${text}</div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
        container.scrollTop = container.scrollHeight;
    }

    async function loadOldMessages() {
        container.innerHTML = `<div style="color: #949ba4; text-align: center; margin-top: 20px;">Loading #${currentChannel}...</div>`;
        const { data, error } = await db.from('Messages').select('*').eq('channel', currentChannel).order('created_at', { ascending: true });
        
        if (error) {
            container.innerHTML = `<div style="color:red; text-align:center;">Error: ${error.message}</div>`;
            return;
        }
        
        container.innerHTML = '';
        if (data.length === 0) {
            container.innerHTML = `<div style="color: #949ba4; text-align: center; margin-top: 20px;">No messages yet in #${currentChannel}!</div>`;
        } else {
            data.forEach(m => addMessageToScreen(m.username, m.content, m.created_at));
        }
    }

    document.querySelectorAll('.channel-item').forEach(btn => {
        btn.onclick = (e) => {
            const item = e.currentTarget;
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentChannel = item.getAttribute('data-channel');
            input.placeholder = `Message #${currentChannel}`;
            loadOldMessages();
        };
    });

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim() !== '') {
            const val = input.value.trim();
            input.value = '';

            if (val === '/clear') {
                let attempt = prompt("Admin Passcode required:");
                const { data, error } = await db.rpc('clear_messages', { passcode: attempt });
                if (error) alert(error.message);
                else if (data !== 'Success') alert(data);
                return; 
            }

            if (currentChannel === 'welcome') {
                let attempt = prompt("Admin Passcode required for #welcome:");
                const { data, error } = await db.rpc('post_admin_message', { 
                    passcode: attempt, p_username: myUsername, p_content: val, p_channel: currentChannel 
                });
                if (error || data !== 'Success') alert(data || "Incorrect Passcode");
                return;
            }

            await db.from('Messages').insert([{ username: myUsername, content: val, channel: currentChannel }]);
        }
    });

    // --- REALTIME CHAT MESSAGES ---
    db.channel('any')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'Messages' }, payload => {
          if (payload.eventType === 'INSERT' && payload.new.channel === currentChannel) {
              addMessageToScreen(payload.new.username, payload.new.content, payload.new.created_at);
          }
          if (payload.eventType === 'DELETE') loadOldMessages();
      })
      .subscribe();

    // --- NEW: REALTIME PRESENCE (MEMBERS BAR) ---
    const presenceChannel = db.channel('online-users', {
        config: { presence: { key: myUsername } },
    });

    presenceChannel.on('presence', { event: 'sync' }, () => {
        const state = presenceChannel.presenceState();
        const membersContainer = document.getElementById('members-container');
        const countDisplay = document.getElementById('online-count');
        
        membersContainer.innerHTML = '';
        let count = 0;

        for (const [username, presences] of Object.entries(state)) {
            count++;
            
            // Check if user is the admin to add crown in sidebar
            const crown = username === 'githbprime#3932' ? '<span class="owner-crown">👑</span>' : '';
            const nameColor = username === 'githbprime#3932' ? 'color: #ffcc00;' : '';

            const html = `
                <div class="member-item">
                    <div class="member-avatar"></div>
                    <div class="member-name" style="${nameColor}">${username}${crown}</div>
                </div>`;
            membersContainer.insertAdjacentHTML('beforeend', html);
        }
        countDisplay.innerText = count;
    });

    presenceChannel.subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
            // Tell the database "I am here"
            await presenceChannel.track({ online_at: new Date().toISOString() });
        }
    });

    loadOldMessages();
</script>
</body>
</html>
