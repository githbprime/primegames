<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discourse | Prime Server</title>
    <style>
        /* CORE LAYOUT */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* SERVER BAR (Far Left) */
        .server-bar { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        .server-icon { width: 48px; height: 48px; border-radius: 50%; background: #313338; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: white; font-weight: bold; }
        .server-icon:hover { border-radius: 15px; background: #5865f2; }

        /* CHANNEL BAR (Middle Left) */
        .channel-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 16px; font-weight: bold; color: white; border-bottom: 1px solid #1e1f22; }
        .channel-list { padding: 8px; flex-grow: 1; }
        .channel-item { padding: 8px 12px; border-radius: 4px; color: #949ba4; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; }
        .channel-item:before { content: "#"; margin-right: 8px; font-size: 20px; color: #5f636a; }
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-item.active { background: #3f4147; color: white; }

        /* USER PANEL (Bottom Left) */
        .user-panel { background: #232428; padding: 8px; display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
        .user-info { overflow: hidden; font-size: 13px; }
        .user-name { color: white; font-weight: bold; display: block; }
        .user-tag { color: #b5bac1; font-size: 11px; }

        /* CHAT AREA (Center) */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: #313338; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        
        /* MESSAGE BLOCK LAYOUT */
        .msg-row { display: flex; padding: 2px 16px; width: 100%; box-sizing: border-box; }
        .msg-row:hover { background: rgba(0,0,0,0.05); }
        .msg-row.first { margin-top: 14px; }
        
        .avatar-col { width: 50px; flex-shrink: 0; }
        .msg-pfp { width: 40px; height: 40px; border-radius: 50%; margin-top: 4px; cursor: pointer; }
        
        .content-col { flex-grow: 1; min-width: 0; padding-left: 10px; }
        .msg-header { margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .username { color: white; font-weight: 500; font-size: 16px; }
        .timestamp { color: #949ba4; font-size: 12px; }
        .msg-text { color: #dbdee1; font-size: 15px; line-height: 1.4; word-break: break-word; }

        /* IMAGE FIX: Prevents fullscreen stretching */
        .chat-img { 
            max-width: 550px; 
            max-height: 400px; 
            border-radius: 8px; 
            margin: 6px 0; 
            display: block; 
            cursor: pointer;
            object-fit: contain;
            background: #2b2d31;
        }

        /* INPUT AREA */
        .input-wrapper { padding: 0 16px 24px; }
        .input-box { background: #383a40; padding: 12px 16px; border-radius: 8px; display: flex; }
        .input-box input { background: transparent; border: none; color: #dcddde; flex-grow: 1; outline: none; font-size: 15px; }

        /* MEMBERS BAR (Right) */
        .members-bar { width: 240px; background: #2b2d31; flex-shrink: 0; padding: 20px 8px; }
        .member-header { color: #949ba4; text-transform: uppercase; font-size: 12px; font-weight: bold; margin-bottom: 10px; padding-left: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="server-bar">
        <div class="server-icon">P</div>
    </div>
    
    <div class="channel-bar">
        <div class="channel-header">Prime Server</div>
        <div class="channel-list">
            <div class="channel-item active" data-channel="welcome">welcome</div>
            <div class="channel-item" data-channel="general">general</div>
        </div>
        <div class="user-panel">
            <img id="my-pfp" class="user-avatar" src="">
            <div class="user-info">
                <span id="my-name" class="user-name">Loading...</span>
                <span id="my-tag" class="user-tag">#0000</span>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="message-container"></div>
        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="chat-input" placeholder="Message #welcome">
            </div>
        </div>
    </div>

    <div class="members-bar">
        <div class="member-header">Online — 1</div>
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_USER = 'githbprime#3951';

    let currentChannel = 'welcome';
    let myUsername = localStorage.getItem('discordGuestName') || "Guest#" + Math.floor(Math.random()*9999);
    let lastUser = null;
    let lastTime = 0;

    // Set user panel
    document.getElementById('my-name').innerText = myUsername.split('#')[0];
    document.getElementById('my-tag').innerText = '#' + myUsername.split('#')[1];
    document.getElementById('my-pfp').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${myUsername}`;

    function renderMessage(m) {
        const container = document.getElementById('message-container');
        const isFirst = (m.username !== lastUser || (new Date(m.created_at) - lastTime) > 300000);
        const isAdmin = m.username.trim().toLowerCase() === ADMIN_USER.toLowerCase();
        
        let content = m.content;
        // Clean up JSON strings if they appear
        if (content.startsWith('{"')) {
            try { content = JSON.parse(content).content; } catch(e) {}
        }

        const row = document.createElement('div');
        row.className = `msg-row ${isFirst ? 'first' : ''}`;
        
        const visualContent = content.startsWith('[IMG]') 
            ? `<img src="${content.replace('[IMG]','')}" class="chat-img">` 
            : `<div class="msg-text">${content}</div>`;

        row.innerHTML = `
            <div class="avatar-col">${isFirst ? `<img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${m.username}" class="msg-pfp">` : ''}</div>
            <div class="content-col">
                ${isFirst ? `<div class="msg-header">
                    <span class="username" style="color:${isAdmin?'#ffcc00':''}">${m.username.split('#')[0]}${isAdmin?' 👑':''}</span>
                    <span class="timestamp">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>` : ''}
                ${visualContent}
            </div>
        `;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
        lastUser = m.username;
        lastTime = new Date(m.created_at);
    }

    async function loadMessages() {
        lastUser = null;
        document.getElementById('message-container').innerHTML = '';
        const { data } = await db.from('Messages').select('*').eq('channel', currentChannel).order('created_at', { ascending: true });
        if(data) data.forEach(renderMessage);
    }

    document.getElementById('chat-input').onkeypress = async (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const val = e.target.value.trim();
            if (currentChannel === 'welcome') {
                const pass = (myUsername.toLowerCase() === ADMIN_USER.toLowerCase()) ? null : prompt("Admin Passcode:");
                await db.rpc('post_admin_message', { passcode: pass, p_username: myUsername, p_content: val, p_channel: 'welcome' });
            } else {
                await db.from('Messages').insert([{ username: myUsername, content: val, channel: currentChannel }]);
            }
            e.target.value = '';
        }
    };

    document.querySelectorAll('.channel-item').forEach(ci => {
        ci.onclick = () => {
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            ci.classList.add('active');
            currentChannel = ci.dataset.channel;
            document.getElementById('chat-input').placeholder = `Message #${currentChannel}`;
            loadMessages();
        };
    });

    db.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'Messages' }, () => loadMessages()).subscribe();
    loadMessages();
</script>
</body>
</html>
