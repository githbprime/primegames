<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 2. INITIALIZE SUPABASE (Paste your keys here!)
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const chatMessages = document.querySelector('.chat-messages');
    const chatInput = document.querySelector('.chat-input');

    // 3. LOAD EXISTING MESSAGES (So they don't disappear on reload)
    async function loadMessages() {
        const { data, error } = await supabase
            .from('messages') // Make sure your table name is 'messages'
            .select('*')
            .order('created_at', { ascending: true });

        if (data) {
            chatMessages.innerHTML = ''; // Clear the "welcome" placeholders
            data.forEach(msg => appendMessage(msg.username, msg.content));
        }
    }

    // 4. FUNCTION TO ADD MESSAGE TO THE SCREEN
    function appendMessage(user, text) {
        const msgHTML = `
            <div class="message">
                <div class="avatar" style="background-color: #5865f2;"></div>
                <div class="msg-content">
                    <div class="msg-header">
                        <span class="username">${user}</span>
                        <span class="timestamp">Just now</span>
                    </div>
                    <div class="text">${text}</div>
                </div>
            </div>`;
        chatMessages.insertAdjacentHTML('beforeend', msgHTML);
        chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll to bottom
    }

    // 5. SEND MESSAGE ON ENTER
    chatInput.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && chatInput.value.trim() !== '') {
            const content = chatInput.value;
            chatInput.value = ''; // Clear the box immediately

            // Insert into Supabase
            const { error } = await supabase
                .from('messages')
                .insert([{ username: 'Guest', content: content }]);
            
            if (error) console.error("Error sending:", error.message);
        }
    });

    // 6. REALTIME LISTEN (The "Magic" part)
    supabase
        .channel('schema-db-changes')
        .on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'messages' }, 
            (payload) => {
                appendMessage(payload.new.username, payload.new.content);
            }
        )
        .subscribe();

    // Start by loading old messages
    loadMessages();
</script>
