<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discourse | Prime Server</title>
    <style>
        /* CORE */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* SIDEBARS */
        .server-bar { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        .channel-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 15px; color: white; font-weight: bold; border-bottom: 1px solid #1e1f22; }
        .channel-list { padding: 10px; flex-grow: 1; }
        .channel-item { padding: 8px 10px; border-radius: 4px; color: #949ba4; cursor: pointer; margin-bottom: 2px; }
        .channel-item.active { background: #3f4147; color: white; }

        /* CHAT AREA - THE STABLE FLEX VERSION */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #313338; min-width: 0; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; }
        
        /* Message Row */
        .message-row { display: flex; padding: 2px 16px; width: 100%; box-sizing: border-box; }
        .message-row:hover { background-color: #2e3035; }
        .message-row.first-in-group { margin-top: 16px; }

        /* Avatar Column (Fixed Width) */
        .avatar-col { width: 48px; flex-shrink: 0; display: flex; justify-content: center; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-top: 4px; }
        
        /* Content Column */
        .content-col { flex-grow: 1; min-width: 0; padding-left: 8px; display: flex; flex-direction: column; }
        
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .username { font-weight: 600; font-size: 16px; color: #f2f3f5; cursor: pointer; }
        .timestamp { color: #949ba4; font-size: 12px; }
        
        .msg-text { 
            font-size: 15px; 
            line-height: 1.375; 
            white-space: pre-wrap; 
            word-break: break-word; /* Prevents long code strings from breaking layout */
            overflow-wrap: break-word;
        }

        .chat-img { max-width: 100%; max-height: 400px; border-radius: 8px; margin: 6px 0; display: block; }

        /* INPUT */
        .chat-input-wrapper { padding: 0 16px 24px; }
        .chat-input-row { background: #383a40; padding: 10px 16px; border-radius: 8px; display: flex; }
        .chat-input { background: transparent; border: none; color: #dcddde; font-size: 15px; flex-grow: 1; outline: none; }

        /* MODALS */
        #signup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .signup-card { background: #313338; padding: 32px; border-radius: 8px; width: 320px; text-align: center; }
        .btn { padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; background: #5865f2; color: white; width: 100%; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 10px; background: #1e1f22; border: none; color: white; border-radius: 4px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="signup-overlay">
    <div class="signup-card">
        <h2 style="color:white">Setup Profile</h2>
        <img id="modal-avatar" style="width:80px; height:80px; border-radius:50%; background:#2b2d31; margin-bottom:10px;">
        <button class="btn" style="background:#4e5058" onclick="generateRandomAvatar()">Randomize</button>
        <input type="text" id="modal-displayname" placeholder="Display Name">
        <input type="text" id="modal-username" placeholder="Username (e.g. prime)">
        <button class="btn" onclick="saveProfile()">Connect</button>
    </div>
</div>

<div class="app-container">
    <div class="server-bar">
        <div class="server-icon" style="background:#5865f2; color:white; font-weight:bold;">P</div>
    </div>
    
    <div class="channel-bar">
        <div class="channel-header">Prime Server</div>
        <div class="channel-list">
            <div class="channel-item active" data-channel="welcome">welcome</div>
            <div class="channel-item" data-channel="general">general</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="message-container"></div>
        <div class="chat-input-wrapper">
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chat-box" placeholder="Message #welcome">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_USER = 'githbprime#3951';

    let currentChannel = 'welcome';
    let myUsername = localStorage.getItem('discordGuestName');
    let myDisplayName = localStorage.getItem('discordDisplayName');
    let myAvatar = localStorage.getItem('discordAvatar');
    let lastUser = null;
    let lastTime = 0;

    function openModal() { document.getElementById('signup-overlay').style.display = 'flex'; generateRandomAvatar(); }
    function generateRandomAvatar() {
        const url = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${Math.random()}`;
        document.getElementById('modal-avatar').src = url;
        myAvatar = url;
    }

    async function saveProfile() {
        const user = document.getElementById('modal-username').value.trim();
        if(!myUsername) myUsername = user + '#' + Math.floor(1000+Math.random()*9000);
        myDisplayName = document.getElementById('modal-displayname').value.trim() || myUsername.split('#')[0];
        localStorage.setItem('discordGuestName', myUsername);
        localStorage.setItem('discordDisplayName', myDisplayName);
        localStorage.setItem('discordAvatar', myAvatar);
        location.reload(); 
    }

    function addMessageToScreen(m) {
        const container = document.getElementById('message-container');
        // Logic: New group if different user OR more than 5 mins gap
        const isFirst = (m.username !== lastUser || (new Date(m.created_at) - lastTime) > 300000);
        
        let displayContent = m.content;
        // Attempt to parse JSON (replies)
        if (displayContent.startsWith('{"')) {
            try {
                const parsed = JSON.parse(displayContent);
                displayContent = parsed.content || displayContent;
            } catch(e) {}
        }

        const isAdmin = m.username.trim().toLowerCase() === ADMIN_USER.toLowerCase();
        const avatarUrl = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${m.username}`;
        
        const row = document.createElement('div');
        row.className = `message-row ${isFirst ? 'first-in-group' : ''}`;
        
        let bodyHtml = displayContent.startsWith('[IMG]') 
            ? `<img src="${displayContent.replace('[IMG]','')}" class="chat-img">` 
            : `<div class="msg-text">${displayContent}</div>`;

        row.innerHTML = `
            <div class="avatar-col">
                ${isFirst ? `<img src="${avatarUrl}" class="msg-avatar">` : ''}
            </div>
            <div class="content-col">
                ${isFirst ? `
                    <div class="msg-header">
                        <span class="username" style="color:${isAdmin?'#ffcc00':''}">${m.username.split('#')[0]}${isAdmin?' 👑':''}</span>
                        <span class="timestamp">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                ` : ''}
                ${bodyHtml}
            </div>
        `;

        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
        lastUser = m.username;
        lastTime = new Date(m.created_at);
    }

    async function loadMessages() {
        lastUser = null; 
        document.getElementById('message-container').innerHTML = '';
        const { data } = await db.from('Messages').select('*').eq('channel', currentChannel).order('created_at', { ascending: true });
        if(data) data.forEach(addMessageToScreen);
    }

    document.getElementById('chat-box').onkeypress = async (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const val = e.target.value.trim();
            const u = myUsername.trim();

            if (currentChannel === 'welcome') {
                let pass = (u.toLowerCase() === ADMIN_USER.toLowerCase()) ? null : prompt("Admin Passcode:");
                const { data, error } = await db.rpc('post_admin_message', { passcode: pass, p_username: u, p_content: val, p_channel: 'welcome' });
                if (error || data !== 'Success') alert("Access Denied: " + (data || error.message));
            } else {
                await db.from('Messages').insert([{ username: u, content: val, channel: currentChannel }]);
            }
            e.target.value = '';
        }
    };

    document.querySelectorAll('.channel-item').forEach(ci => {
        ci.onclick = () => {
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            ci.classList.add('active');
            currentChannel = ci.dataset.channel;
            loadMessages();
        };
    });

    if (!myUsername) openModal();
    else {
        db.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'Messages' }, () => loadMessages()).subscribe();
        loadMessages();
    }
</script>
</body>
</html>
