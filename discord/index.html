<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discourse | Prime Server</title>
    <style>
        /* BASE STYLES */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #313338; color: #dbdee1; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* SIDEBARS */
        .server-bar { width: 72px; background: #1e1f22; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
        .server-icon { width: 48px; height: 48px; border-radius: 50%; background: #313338; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; overflow: hidden; color: white; font-weight: bold; }
        .server-icon:hover { border-radius: 15px; background: #5865f2; }

        .channel-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 16px; font-weight: bold; color: white; border-bottom: 1px solid #1e1f22; }
        .channel-list { padding: 8px; flex-grow: 1; }
        .channel-item { padding: 8px 12px; border-radius: 4px; color: #949ba4; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; transition: 0.1s; }
        .channel-item:before { content: "#"; margin-right: 8px; font-size: 20px; color: #5f636a; }
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-item.active { background: #3f4147; color: white; }

        /* USER PANEL (BOTTOM LEFT) */
        .user-panel { background: #232428; padding: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.1s; }
        .user-panel:hover { background: #35373c; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1e1f22; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 13px; font-weight: bold; color: white; }
        .user-hash { font-size: 11px; color: #b5bac1; }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: #313338; position: relative; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        
        /* MESSAGE BLOCK */
        .msg-row { display: flex; padding: 2px 16px; width: 100%; box-sizing: border-box; position: relative; flex-direction: column; }
        .msg-row:hover { background: rgba(0,0,0,0.05); }
        .msg-row.first { margin-top: 14px; }
        
        .msg-flex { display: flex; width: 100%; }
        .avatar-col { width: 50px; flex-shrink: 0; }
        .msg-pfp { width: 40px; height: 40px; border-radius: 50%; margin-top: 4px; object-fit: cover; cursor: pointer; }
        .content-col { flex-grow: 1; min-width: 0; padding-left: 10px; }
        
        /* ACTION BAR */
        .msg-actions { position: absolute; right: 16px; top: -16px; background: #313338; border: 1px solid #1e1f22; border-radius: 4px; display: none; z-index: 10; padding: 2px; }
        .msg-row:hover .msg-actions { display: flex; }
        .action-btn { padding: 4px 8px; cursor: pointer; color: #b5bac1; font-size: 14px; border-radius: 4px; }
        .action-btn:hover { background: #3f4147; color: white; }

        /* REPLIES & REACTIONS */
        .reply-line { color: #b5bac1; font-size: 13px; display: flex; align-items: center; margin-left: 20px; margin-bottom: 4px; opacity: 0.8; }
        .reply-line:before { content: ""; width: 30px; height: 10px; border-left: 2px solid #4e5058; border-top: 2px solid #4e5058; border-top-left-radius: 6px; margin-right: 6px; margin-top: 10px; }
        .react-bar { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .react-pill { background: #2b2d31; border: 1px solid transparent; border-radius: 6px; padding: 2px 6px; font-size: 12px; cursor: pointer; color: #b5bac1; }
        .react-pill.active { background: rgba(88,101,242,0.15); border-color: #5865f2; color: #5865f2; }

        .msg-header { margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
        .username { color: white; font-weight: 500; font-size: 16px; cursor: pointer; }
        .timestamp { color: #949ba4; font-size: 12px; }
        .msg-text { color: #dbdee1; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .chat-img { max-width: 100%; max-height: 350px; border-radius: 8px; margin: 6px 0; display: block; background: #2b2d31; cursor: zoom-in; }

        /* INPUT AREA */
        .input-wrapper { padding: 0 16px 24px; }
        .preview-bar { background: #2b2d31; padding: 8px 16px; border-radius: 8px 8px 0 0; display: none; align-items: center; justify-content: space-between; font-size: 13px; color: #b5bac1; margin-bottom: 2px; }
        .preview-img-container { position: relative; display: inline-block; }
        .preview-img { height: 60px; border-radius: 4px; }
        .cancel-btn { cursor: pointer; color: #f23f42; font-weight: bold; font-size: 16px; padding: 4px; }
        
        .input-box { background: #383a40; padding: 10px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        .input-box input[type="text"] { background: transparent; border: none; color: #dcddde; flex-grow: 1; outline: none; font-size: 15px; }

        /* MEMBERS BAR */
        .members-bar { width: 240px; background: #2b2d31; flex-shrink: 0; padding: 20px 8px; }
        .member-header { color: #949ba4; text-transform: uppercase; font-size: 12px; font-weight: bold; margin-bottom: 12px; padding-left: 8px; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 4px; color: #949ba4; cursor: pointer; transition: 0.1s; }
        .member-item:hover { background: #35373c; color: #dbdee1; } 
        .member-avatar-wrapper { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
        .member-avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; background: #23a559; border-radius: 50%; border: 2px solid #2b2d31; } 

        /* OVERLAYS & MODALS */
        #signup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .signup-card { background: #313338; padding: 32px; border-radius: 8px; width: 340px; text-align: center; }
        
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; object-fit: contain; }

        .mini-profile-overlay { position: fixed; inset: 0; z-index: 1000; display: none; }
        .mini-profile-card { position: absolute; width: 300px; background: #111214; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); overflow: hidden; z-index: 1001; display: none; flex-direction: column; }
        .mini-profile-banner { height: 60px; background: #5865f2; }
        .mini-profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 6px solid #111214; margin-top: -40px; margin-left: 16px; background: #1e1f22; object-fit: cover; }
        .mini-profile-body { padding: 12px 16px 16px; background: #111214; color: #dbdee1; display: flex; flex-direction: column; gap: 4px; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<div id="mp-overlay" class="mini-profile-overlay" onclick="closeMiniProfile()"></div>
<div id="mp-card" class="mini-profile-card">
    <div class="mini-profile-banner"></div>
    <img id="mp-pfp" class="mini-profile-avatar">
    <div class="mini-profile-body">
        <div style="font-size: 20px; font-weight: bold;" id="mp-name"></div>
        <div style="font-size: 14px; color: #b5bac1;" id="mp-hash"></div>
    </div>
</div>

<div id="signup-overlay">
    <div class="signup-card">
        <h2 style="color:white" id="modal-title">Set Up Profile</h2>
        
        <div style="display:flex; justify-content:center; gap:16px; margin-bottom:20px; align-items:center;">
            <img id="modal-avatar" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #1e1f22;">
            <div style="display:flex; flex-direction:column; gap:8px;">
                <button onclick="document.getElementById('modal-avatar').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${Math.random()}`" style="padding:6px 12px; background:#4e5058; color:white; border:none; border-radius:4px; cursor:pointer;">🎲 Randomize</button>
                <label style="padding:6px 12px; background:#2b2d31; color:white; border:none; border-radius:4px; cursor:pointer; font-size:13px;">
                    📁 Upload Custom
                    <input type="file" accept="image/*" style="display:none;" onchange="handleAvatarUpload(this)">
                </label>
            </div>
        </div>

        <input type="text" id="modal-username" placeholder="Username (e.g. prime)" style="width:100%; padding:10px; margin-bottom:20px; background:#1e1f22; border:none; color:white; border-radius:4px; box-sizing:border-box;">
        <button onclick="saveProfile()" style="width:100%; padding:12px; background:#5865f2; border:none; color:white; border-radius:4px; font-weight:bold; cursor:pointer;">Save & Join</button>
        <div id="cancel-profile-btn" onclick="document.getElementById('signup-overlay').style.display='none'" style="display:none; color:#949ba4; margin-top:15px; cursor:pointer; font-size:13px;">Cancel</div>
    </div>
</div>

<div class="app-container">
    <div class="server-bar">
        <div class="server-icon">P</div>
    </div>
    
    <div class="channel-bar">
        <div class="channel-header">Prime Server</div>
        <div class="channel-list">
            <div class="channel-item active" data-channel="welcome">welcome</div>
            <div class="channel-item" data-channel="general">general</div>
        </div>
        <div class="user-panel" onclick="openModal(true)">
            <img id="my-pfp" class="user-avatar">
            <div class="user-info">
                <div class="user-name" id="my-name">Guest</div>
                <div class="user-hash" id="my-hash">#0000</div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="message-container"></div>
        <div class="input-wrapper">
            <div id="reply-bar" class="preview-bar">
                <span>Replying to <strong id="reply-target"></strong></span>
                <span class="cancel-btn" onclick="cancelReply()">✕</span>
            </div>
            <div id="attach-bar" class="preview-bar">
                <div class="preview-img-container">
                    <img id="attach-preview-img" class="preview-img">
                </div>
                <span class="cancel-btn" onclick="cancelAttachment()">✕</span>
            </div>
            <div class="input-box">
                <label style="color:#b5bac1; cursor:pointer; font-size:20px; font-weight:bold;" title="Upload Image">
                    +
                    <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleFileAsBase64(this)">
                </label>
                <input type="text" id="chat-input" placeholder="Message #welcome">
            </div>
        </div>
    </div>

    <div class="members-bar">
        <div class="member-header">Online — <span id="online-count">0</span></div>
        <div id="member-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_USER = 'githbprime#3951';

    let currentChannel = 'welcome';
    let myUsername = localStorage.getItem('discordGuestName');
    let myAvatar = localStorage.getItem('discordGuestPfp');
    let pendingReply = null;
    let pendingAttachment = null;
    let lastUser = null;
    let lastTime = 0;

    function isAdmin(user) {
        return user && user.toLowerCase() === ADMIN_USER.toLowerCase();
    }

    // --- UI INTERACTIVITY ---
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function showMiniProfile(event, username, pfpSrc) {
        const card = document.getElementById('mp-card');
        const overlay = document.getElementById('mp-overlay');
        
        const isAdm = isAdmin(username);
        const nameColor = isAdm ? '#ffcc00' : 'white';
        const crown = isAdm ? ' 👑' : '';
        const parts = username.split('#');

        document.getElementById('mp-pfp').src = pfpSrc;
        document.getElementById('mp-name').innerHTML = `<span style="color:${nameColor}">${parts[0]}${crown}</span>`;
        document.getElementById('mp-hash').innerText = '#' + (parts[1] || '0000');
        
        // Position intelligently
        let top = event.clientY - 100;
        let left = event.clientX - 320; 
        if (top < 10) top = 10;
        
        card.style.top = top + 'px';
        card.style.left = left + 'px';
        
        overlay.style.display = 'block';
        card.style.display = 'flex';
    }
    function closeMiniProfile() {
        document.getElementById('mp-overlay').style.display = 'none';
        document.getElementById('mp-card').style.display = 'none';
    }

    // --- DB ACTIONS & AUTH ---
    async function executeDelete(msgId, btnElement) {
        const row = btnElement.closest('.msg-row');
        row.style.display = 'none'; // Optimistically hide it instantly
        
        const { error } = await db.from('Messages').delete().eq('id', msgId);
        if (error) { 
            row.style.display = 'flex'; // Bring back if failed
            console.error("Delete failed:", error.message); 
            alert("Delete blocked by database. Check Supabase RLS policies: " + error.message); 
        }
    }

    async function addReaction(msgId, emoji) {
        const { data, error: fetchErr } = await db.from('Messages').select('reactions').eq('id', msgId).single();
        if (fetchErr) return;
        let r = data.reactions || {};
        if (!r[emoji]) r[emoji] = [];
        const idx = r[emoji].indexOf(myUsername);
        if (idx > -1) r[emoji].splice(idx, 1); else r[emoji].push(myUsername);
        if (r[emoji].length === 0) delete r[emoji];
        const { error } = await db.from('Messages').update({ reactions: r }).eq('id', msgId);
        if (error) alert("Reaction failed. Check Supabase RLS.");
    }

    function setReply(id, name, pfp, text) {
        pendingReply = { id, name, pfp, text: text.substring(0, 40) };
        document.getElementById('reply-target').innerText = name;
        document.getElementById('reply-bar').style.display = 'flex';
        document.getElementById('chat-input').focus();
    }
    function cancelReply() { pendingReply = null; document.getElementById('reply-bar').style.display = 'none'; }
    function cancelAttachment() { pendingAttachment = null; document.getElementById('attach-bar').style.display = 'none'; }

    // --- FILE UPLOADS ---
    function handleAvatarUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 32, 32);
                document.getElementById('modal-avatar').src = canvas.toDataURL('image/png', 0.8);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function handleFileAsBase64(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let width = img.width, height = img.height;
                const MAX = 1920; 
                if (width > MAX || height > MAX) {
                    const ratio = Math.min(MAX / width, MAX / height);
                    width *= ratio; height *= ratio;
                }
                canvas.width = width; canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                pendingAttachment = canvas.toDataURL('image/jpeg', file.size > 2000000 ? 0.6 : 0.9);
                document.getElementById('attach-preview-img').src = pendingAttachment;
                document.getElementById('attach-bar').style.display = 'flex';
                document.getElementById('chat-input').focus();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        input.value = ""; 
    }

    // --- MESSAGING ---
    function renderMessage(m) {
        const container = document.getElementById('message-container');
        const isFirst = (m.username !== lastUser || (new Date(m.created_at) - lastTime) > 300000);
        const isAdm = isAdmin(m.username);
        
        let content = m.content || "";
        let replyHtml = '';
        if (content.startsWith('{"_reply"')) {
            try {
                const p = JSON.parse(content);
                content = p.content;
                replyHtml = `<div class="reply-line"><img style="width:16px;height:16px;border-radius:50%;margin-right:5px;" src="${p._reply.pfp}"><strong>${p._reply.name}</strong>: ${p._reply.text}</div>`;
            } catch(e){}
        }

        let imgSrc = null;
        if (content.includes('[IMG]')) {
            const parts = content.split('[IMG]');
            content = parts[0]; 
            imgSrc = parts[1]; 
        }

        const row = document.createElement('div');
        row.className = `msg-row ${isFirst || replyHtml ? 'first' : ''}`;
        
        let reactHtml = '<div class="react-bar">';
        if (m.reactions) {
            for (let [emoji, users] of Object.entries(m.reactions)) {
                reactHtml += `<div class="react-pill ${users.includes(myUsername)?'active':''}" onclick="addReaction('${m.id}', '${emoji}')">${emoji} ${users.length}</div>`;
            }
        }
        reactHtml += '</div>';

        const textVisual = content.trim() ? `<div class="msg-text">${content}</div>` : '';
        const imgVisual = imgSrc ? `<img src="${imgSrc}" class="chat-img" onclick="openLightbox(this.src)">` : '';

        row.innerHTML = `
            ${replyHtml}
            <div class="msg-flex">
                <div class="avatar-col">${(isFirst || replyHtml) ? `<img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${m.username}" class="msg-pfp" onclick="showMiniProfile(event, '${m.username}', this.src)">` : ''}</div>
                <div class="content-col">
                    ${(isFirst || replyHtml) ? `<div class="msg-header">
                        <span class="username" style="color:${isAdm?'#ffcc00':''}" onclick="showMiniProfile(event, '${m.username}', 'https://api.dicebear.com/7.x/pixel-art/svg?seed=${m.username}')">${m.username.split('#')[0]}${isAdm?' 👑':''}</span>
                        <span class="timestamp">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>` : ''}
                    ${textVisual}
                    ${imgVisual}
                    ${reactHtml === '<div class="react-bar"></div>' ? '' : reactHtml}
                </div>
            </div>
            <div class="msg-actions">
                <div class="action-btn" onclick="addReaction('${m.id}', '👍')">👍</div>
                <div class="action-btn" onclick="setReply('${m.id}', '${m.username.split('#')[0]}', 'https://api.dicebear.com/7.x/pixel-art/svg?seed=${m.username}', '${content}')">↩️</div>
                ${(m.username === myUsername || isAdm) ? `<div class="action-btn" onclick="executeDelete('${m.id}', this)">🗑️</div>` : ''}
            </div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
        lastUser = m.username; lastTime = new Date(m.created_at);
    }

    async function sendMessage(val) {
        let finalVal = val;
        if (pendingAttachment) finalVal += "[IMG]" + pendingAttachment;
        if (pendingReply) finalVal = JSON.stringify({ _reply: pendingReply, content: finalVal });
        
        if (currentChannel === 'welcome') {
            const pass = isAdmin(myUsername) ? null : prompt("Admin Passcode:");
            await db.rpc('post_admin_message', { passcode: pass, p_username: myUsername, p_content: finalVal, p_channel: 'welcome' });
        } else {
            await db.from('Messages').insert([{ username: myUsername, content: finalVal, channel: currentChannel }]);
        }
        cancelReply(); cancelAttachment();
    }

    document.getElementById('chat-input').onkeypress = async (e) => { 
        if(e.key === 'Enter') {
            const val = e.target.value.trim();
            
            // ADMIN DATABASE WIPE COMMAND
            if (val === '/clear') {
                if (isAdmin(myUsername)) {
                    const pass = prompt("WARNING: Enter admin passcode to WIPE the database channel:");
                    if (pass !== null) {
                        const { error } = await db.from('Messages').delete().eq('channel', currentChannel);
                        if (error) alert("Clear blocked by Supabase RLS: " + error.message);
                    }
                } else {
                    alert("Only the Admin can wipe the database.");
                }
                e.target.value = ''; return;
            }

            if(val || pendingAttachment) {
                sendMessage(val); 
                e.target.value = ''; 
            }
        } 
    };

    // --- INITIALIZATION ---
    function openModal(isEdit = false) {
        document.getElementById('signup-overlay').style.display = 'flex';
        if (isEdit && myUsername) {
            document.getElementById('modal-title').innerText = "Edit Profile";
            document.getElementById('modal-username').value = myUsername.split('#')[0];
            document.getElementById('modal-avatar').src = myAvatar || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${myUsername}`;
            document.getElementById('cancel-profile-btn').style.display = 'block';
        } else {
            document.getElementById('modal-avatar').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${Math.random()}`;
        }
    }
    
    function saveProfile() {
        const u = document.getElementById('modal-username').value.trim();
        if(!u) return alert("Username required");
        
        const currentTag = myUsername ? myUsername.split('#')[1] : Math.floor(1000+Math.random()*9000);
        myUsername = u + "#" + currentTag;
        
        localStorage.setItem('discordGuestName', myUsername);
        localStorage.setItem('discordGuestPfp', document.getElementById('modal-avatar').src);
        location.reload();
    }

    if (!myUsername) openModal(false);
    else {
        if (!myAvatar) myAvatar = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${myUsername}`;
        
        // BOTTOM LEFT PROFILE POPULATION
        const isMeAdmin = isAdmin(myUsername);
        document.getElementById('my-name').innerHTML = `<span style="color:${isMeAdmin?'#ffcc00':'white'}">${myUsername.split('#')[0]}${isMeAdmin?' 👑':''}</span>`;
        document.getElementById('my-hash').innerText = '#' + (myUsername.split('#')[1] || '0000');
        document.getElementById('my-pfp').src = myAvatar;
        
        db.channel('msgs').on('postgres_changes', { event: '*', schema: 'public', table: 'Messages' }, () => loadMessages()).subscribe();
        loadMessages();

        const presence = db.channel('online_users', { config: { presence: { key: myUsername } } });
        presence.on('presence', { event: 'sync' }, () => {
            const state = presence.presenceState();
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            const uniqueUsers = Object.keys(state);
            document.getElementById('online-count').innerText = uniqueUsers.length;
            uniqueUsers.forEach(userKey => {
                const isAdm = isAdmin(userKey);
                const nameColor = isAdm ? '#ffcc00' : '#dbdee1';
                const crown = isAdm ? ' 👑' : '';
                // Pull custom avatar from presence state, otherwise fallback
                const userPfp = state[userKey][0].pfp || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${userKey}`;

                list.innerHTML += `
                <div class="member-item" onclick="showMiniProfile(event, '${userKey}', '${userPfp}')">
                    <div class="member-avatar-wrapper">
                        <img src="${userPfp}">
                        <div class="status-dot"></div>
                    </div>
                    <span style="color:${nameColor}">${userKey.split('#')[0]}${crown}</span>
                </div>`;
            });
        }).subscribe(async (status) => {
            if (status === 'SUBSCRIBED') await presence.track({ online_at: new Date().toISOString(), pfp: myAvatar });
        });
    }

    async function loadMessages() {
        lastUser = null; document.getElementById('message-container').innerHTML = '';
        const { data } = await db.from('Messages').select('*').eq('channel', currentChannel).order('created_at', { ascending: true });
        if(data) data.forEach(renderMessage);
    }
    
    document.querySelectorAll('.channel-item').forEach(ci => {
        ci.onclick = () => {
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            ci.classList.add('active');
            currentChannel = ci.dataset.channel;
            loadMessages();
        };
    });
</script>
</body>
</html>
