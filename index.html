<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="fvicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>

        #hero {
            position: relative;
            width: 100%;
            height: 85vh; /* Takes up 65% of your screen height */
            min-height: 400px;
            background-size: cover;
            background-position: top center;
            display: flex;
            align-items: center;
            /* Pulls the image up to sit underneath your sticky header */
            margin-top: -80px; 
        }

        /* The Gradient Overlays */
        #hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 1st gradient makes the left dark for text, 2nd gradient fades the bottom into your site's background color */
            background: 
                linear-gradient(to right, var(--bg) 5%, rgba(5,5,5,0.6) 45%, transparent 100%),
                linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; /* Keeps text above the gradient */
            padding: 0 4%;
            max-width: 600px;
            margin-top: 40px; /* Pushes text down slightly so it isn't hidden by the header */
        }

        #hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            font-style: italic;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        #hero-desc {
            font-size: 1.1rem;
            color: #ccc;
            line-height: 1.5;
            margin: 0 0 30px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .play-btn {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(185, 9, 11, 0.3);
        }

        .play-btn:hover {
            background-color: #e60b0d; /* Slightly brighter red on hover */
            transform: scale(1.05);
        }

        .vote-hero-btn {
            position: absolute;
            bottom: 25px; 
            left: 4%;     
            z-index: 10;  
            
            opacity: 1; 

            color: #bbb; 
            border-color: #666;

            padding: 8px 20px; 
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .vote-hero-btn:hover {
            background-color: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        
        :root {
            --bg: #050505;
            --card-bg: #141414;
            --text: #e5e5e5;
            --accent: #b9090b;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        header {
            padding: 20px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100;
        }
        .logo {
            color: var(--accent);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #searchBar {
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            width: 250px;
            outline: none;
        }

        .container {
            padding: 0 4% 50px 4%;
        }
        .row-title {
            font-size: 1.4vw;
            font-weight: 500;
            margin-top: 30px;
            margin-bottom: -10px;
            color: #ffffff;
        }
        .big-row-title {
            font-size: 2.8vw;
            font-weight: 1000;
            margin-top: 60px;
            margin-bottom: -20px;
            color: #ffffff;
        }
        .row {
            display: flex;
            gap: 35px;
            overflow-x: auto;
            padding-top: 40px;
            padding-bottom: 50px;
            padding-left: 30px;
            padding-right: 30px;
            scrollbar-width: none;
        }
        .row::-webkit-scrollbar {
            display: none;
        }
        
        #all {
            flex-wrap: wrap;
            overflow-x: visible;
        }

        .card {
            flex: 0 0 auto;
            width: 180px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .card img.glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 4px;
            filter: blur(20px);
            opacity: 0.75;
            transform: scale(1.15) translateY(5px);
            z-index: 0;
            transition: opacity 0.3s, filter 0.3s;
        }
        .card:hover img.glow {
            opacity: 1;
            filter: blur(25px);
        }
        .card img.poster {
            position: relative;
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #222;
            z-index: 1;
        }
        .card-title {
            margin-top: 8px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            position: relative;
            z-index: 2;
        }

        footer {
            padding: 60px 0;
            display: flex;
            justify-content: center;
            background-color: var(--bg);
        }
        .request-btn {
            background-color: transparent;
            color: #777;
            border: 1px solid #444;
            padding: 12px 35px;
            font-size: 14px;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .request-btn:hover {
            background-color: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .all-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-right: 4%;
            margin-top: 30px;
        }
        .all-header .row-title {
            margin-top: 0;
        }
        #sortDropdown {
            background-color: var(--card-bg);
            color: var(--text);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        #sortDropdown:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">PRIME GAMES</div>
        <input type="text" id="searchBar" placeholder="Search games..." onkeyup="search()">
    </header>

    <div id="hero">
        <div class="hero-content">
            <h1 id="hero-title"></h1>
            <p id="hero-desc"></p>
            <a href="#" id="hero-play" class="play-btn">▶ Play Now</a>
        </div>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeS_ODOaVA3azjFqq7a31kPo8krNr6x7iWwRavSEfqqhKb0sw/viewform?usp=preview" 
           target="_blank" 
           class="request-btn vote-hero-btn">
           Vote for Featured Game of the Week
        </a>
    </div>
    
    <div class="container">
        <div class="row-title">Trending Now</div>
        <div class="row" id="trending"></div>
        <div class="row-title">New Releases</div>
        <div class="row" id="new"></div>
        <div class="row-title">Pokémon Main Series</div>
        <div class="row" id="pokemon"></div>
        <div class="all-header">
            <div class="row-title">All Games</div>
            <select id="sortDropdown" onchange="sortAllGames()">
                <option value="newest">Oldest First</option>
                <option value="oldest">Newest First</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
        </div>
        <div class="row" id="all"></div>
        <div class="big-row-title">Apps</div>
        <div class="row" id="apps"></div>
    </div>

    <footer id="requestFooter">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScIhmI3hEFJE3hjmUuGqQIFWCHLSbySl_R3BNaJIWPNFbFuSA/viewform?usp=publish-editor" target="_blank" class="request-btn">Request a Game</a>
    </footer>

    <script>
        // --- FEATURED GAME (Separate from gamesDB) ---
        const featuredGame = { 
            title: "ULTRAKILL", 
            url: "./ultrakill/index.html", 
            imgSrc: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1229490/capsule_616x353.jpg?t=1774188523", 
            desc: "Mankind is dead. Blood is fuel. Hell is full. Experience a fast-paced, ultra-violent retro FPS that combines high-skill movement with stylish combat." 
        };

        function loadFeaturedGame() {
            const hero = document.getElementById('hero');
            document.getElementById('hero-title').textContent = featuredGame.title;
            document.getElementById('hero-desc').textContent = featuredGame.desc;
            document.getElementById('hero-play').href = featuredGame.url;
            
            // Set the background image dynamically
            hero.style.backgroundImage = `url('${featuredGame.imgSrc}')`;
        }
        
        const gamesDB = [
            { title: "Your Only Move Is HUSTLE", url: "./hustle/index.html", imgSrc: "https://e.snmc.io/lk/f/x/d65d937781df0213f0bf0aa628aa0d06/13368350", tags: ["trending", "all"], index: "1" },
            { title: "People Playground", url: "./ppg/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFTD-fKpHod-WBHHOwok7sZ-gK3RpiBLyTxg&s", tags: ["all"], index: "2" },
            { title: "Geometry Dash", url: "./gdash/index.html", imgSrc: "https://images.ctfassets.net/vfkpgemp7ek3/1204734511/2c0723c100ed8d02a603dfe74597a6cb/geometry-dash-revenue.jpg", tags: ["all"], index: "3" },
            { title: "Needy Streamer Overload", url: "./needy/index.html", imgSrc: "https://i.ytimg.com/vi/BBzKrPTFcsU/hqdefault.jpg", tags: ["all"], index: "4" },
            { title: "Slope", url: "./slope/index.html", imgSrc: "https://i.ytimg.com/vi/yEnVcLpTri0/maxresdefault.jpg", tags: ["trending", "all"], index: "5" },
            { title: "ULTRAKILL", url: "./ultrakill/index.html", imgSrc: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1229490/capsule_616x353.jpg", tags: ["trending", "all"], index: "6" },
            { title: "The Binding of Isaac", url: "./tboi/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSVwshZ-Gy5uWVlR5YIFHF93Dp4uwHEf2-rw&s", tags: ["trending", "all"], index: "7" },
            { title: "Pokémon: Fire Red", url: "./firered/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR86fNkVgTboxGRyLAE-6dY5Q9ViEQoOG7SRQ&s", tags: ["pokemon", "all"], index: "8" },
            { title: "Melon Sandbox", url: "./melon/index.html", imgSrc: "https://images.steamusercontent.com/ugc/2041853622142661038/6E00C11C89A6207B1A090B94A96A02FA64657896/?imw=637&imh=358&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true", tags: ["all"], index: "9" },
            { title: "Discourse", url: "https://githbprime.github.io/Discourse/", imgSrc: "./discord/Discourse.png", tags: ["apps"] },
            { title: "N-GON", url: "./ngon/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS70oG-UWKD2RmRslOTq7RhIIduST4piX1eTQ&s", tags: ["new", "trending", "all"], index: "10" },
            { title: "10 Minutes till Dawn", url: "./dawn/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyEL5h4Dimu70qinRlg_3GdHAfh2aU74aA1w&s", tags: ["new", "all"], index: "11" },
            { title: "Friday Night Funkin'", url: "./fnf/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQmXu3CBflwvGGH5f6KcdpQiBrQgy5dRUObw&s", tags: ["new", "all"], index: "12" },
            { title: "Snake Game", url: "./snakegame/index.html", imgSrc: "./snakegame/poster.png", tags: ["new", "trending", "all"], index: "13" },
            { title: "Basket Random", url: "./basketrandom/index.html", imgSrc: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSr_fo1jcMjvxJBRFEtoewhcZznf65m07vc_g&s", tags: ["new", "all"], index: "14" }
        ];

        function loadGames() {
            gamesDB.forEach(game => {
                const cardHTML = `
                    <a href="${game.url}" class="card" data-name="${game.title}">
                        <img src="${game.imgSrc}" alt="${game.title} Glow" class="glow">
                        <img src="${game.imgSrc}" alt="${game.title}" class="poster">
                        <span class="card-title">${game.title}</span>
                    </a>
                `;
                game.tags.forEach(tag => {
                    const targetRow = document.getElementById(tag);
                    if (targetRow) {
                        targetRow.insertAdjacentHTML('beforeend', cardHTML);
                    }
                });
            });
        }

function search() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let titles = document.getElementsByClassName('row-title');
            let bigTitles = document.getElementsByClassName('big-row-title');
            let trendingRow = document.getElementById('trending');
            let newRow = document.getElementById('new');
            let pokemonRow = document.getElementById('pokemon');
            let allRow = document.getElementById('all');
            let appsRow = document.getElementById('apps');
            let footer = document.getElementById('requestFooter');
            let hero = document.getElementById('hero');

            if (input.trim() !== "") {
                hero.style.display = "none";
                footer.style.display = "none";
                
                // Hide all section headers
                for (let i = 0; i < titles.length; i++) titles[i].style.display = "none";
                for (let i = 0; i < bigTitles.length; i++) bigTitles[i].style.display = "none";
                
                // Hide specific category rows
                trendingRow.style.display = "none";
                newRow.style.display = "none";
                pokemonRow.style.display = "none";
                
                // Keep All and Apps rows visible so the filtered results show up
                allRow.style.display = "flex";
                appsRow.style.display = "flex";
                
                // Search through cards in BOTH the 'all' container and 'apps' container
                let searchableCards = document.querySelectorAll('#all .card, #apps .card');
                for (let i = 0; i < searchableCards.length; i++) {
                    let name = searchableCards[i].getAttribute('data-name').toLowerCase();
                    searchableCards[i].style.display = name.includes(input) ? "block" : "none";
                }
            } else {
                hero.style.display = "flex";
                footer.style.display = "flex";
                
                // Bring back all headers
                for (let i = 0; i < titles.length; i++) titles[i].style.display = "block";
                for (let i = 0; i < bigTitles.length; i++) bigTitles[i].style.display = "block";
                
                // Restore all rows
                trendingRow.style.display = "flex";
                newRow.style.display = "flex";
                pokemonRow.style.display = "flex";
                appsRow.style.display = "flex";
                
                // Show every card again
                let allCards = document.getElementsByClassName('card');
                for (let i = 0; i < allCards.length; i++) allCards[i].style.display = "block";
            }
        }

        function sortAllGames() {
            const criteria = document.getElementById('sortDropdown').value;
            const allRow = document.getElementById('all');
            
            let allCategoryGames = gamesDB.filter(game => game.tags.includes("all"));
            
            allCategoryGames.sort((a, b) => {
                if (criteria === 'az') return a.title.localeCompare(b.title);
                if (criteria === 'za') return b.title.localeCompare(a.title);
                
                let indexA = parseInt(a.index) || 0;
                let indexB = parseInt(b.index) || 0;
                
                if (criteria === 'oldest') return indexB - indexA;
                if (criteria === 'newest') return indexA - indexB;
            });
            
            allRow.innerHTML = '';
            
            allCategoryGames.forEach(game => {
                const cardHTML = `
                    <a href="${game.url}" class="card" data-name="${game.title}">
                        <img src="${game.imgSrc}" alt="${game.title} Glow" class="glow">
                        <img src="${game.imgSrc}" alt="${game.title}" class="poster">
                        <span class="card-title">${game.title}</span>
                    </a>
                `;
                allRow.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        window.onload = () => {
            loadFeaturedGame();
            loadGames();
            sortAllGames();
        };
    </script>
</body>
</html>
