<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        :root { --bg: #050505; --card-bg: #141414; --text: #e5e5e5; --accent: #b9090b; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header & Search */
        header { padding: 20px 4%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 100; }
        .logo { color: var(--accent); font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        #searchBar { background: rgba(0,0,0,0.6); border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 4px; width: 250px; outline: none; }

        /* Rows */
        .container { padding: 0 4% 50px 4%; }
        /* Pulled bottom margin up slightly to balance the new top padding on the row */
        .row-title { font-size: 1.4vw; font-weight: 500; margin-top: 30px; margin-bottom: -10px; color: #999; } 
        
        /* UPDATED: Increased padding to stop clipping, and increased gap for better spacing */
        .row { 
            display: flex; 
            gap: 35px; /* More breathing room between the posters */
            overflow-x: auto; 
            padding-top: 40px; /* Room for top glow */
            padding-bottom: 50px; /* Room for bottom glow */
            padding-left: 30px; /* Fixes left clipping */
            padding-right: 30px; /* Fixes right clipping */
            scrollbar-width: none; 
        }
        .row::-webkit-scrollbar { display: none; }

        /* Game Posters & Glow Effects */
        .card { flex: 0 0 auto; width: 180px; position: relative; cursor: pointer; transition: transform 0.3s; text-decoration: none; color: inherit; }
        .card:hover { transform: scale(1.05); z-index: 10; }
        
        /* The duplicated blurred background image */
        .card img.glow { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 260px; 
            object-fit: cover; 
            border-radius: 4px; 
            filter: blur(20px); 
            opacity: 0.75; 
            transform: scale(1.15) translateY(5px); 
            z-index: 0; 
            transition: opacity 0.3s, filter 0.3s; 
        }
        
        /* Make the glow pop when hovering! */
        .card:hover img.glow {
            opacity: 1; 
            filter: blur(25px);
        }

        /* The main poster image */
        .card img.poster { 
            position: relative; /* Keeps it layered above the glow */
            width: 100%; 
            height: 260px; 
            object-fit: cover; 
            border-radius: 4px; 
            border: 1px solid #222; 
            z-index: 1; 
        }
        
        .card-title { margin-top: 8px; font-size: 14px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; position: relative; z-index: 2; }
    </style>
</head>
<body>

<header>
    <div class="logo">PRIME GAMES</div>
    <input type="text" id="searchBar" placeholder="Search games..." onkeyup="search()">
</header>

<div class="container">
    <div class="row-title">Trending Now</div>
    <div class="row" id="trending-row">
        <a href="./hustle/index.html" class="card" data-name="YOMI Hustle">
            <img src="https://e.snmc.io/lk/f/x/d65d937781df0213f0bf0aa628aa0d06/13368350" alt="YOMIH Glow" class="glow">
            <img src="https://e.snmc.io/lk/f/x/d65d937781df0213f0bf0aa628aa0d06/13368350" alt="YOMIH" class="poster">
            <span class="card-title">Your Only Move Is HUSTLE</span>
        </a>
        
        <a href="./ppg/index.html" class="card" data-name="PPG">
            <img src="https://images.steamusercontent.com/ugc/4095452832467359472/B4E6625860974C17D011AC1D3F0063E1F8005604/?imw=5000&imh=5000&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false" alt="TurboWarp Glow" class="glow">
            <img src="https://images.steamusercontent.com/ugc/4095452832467359472/B4E6625860974C17D011AC1D3F0063E1F8005604/?imw=5000&imh=5000&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false" alt="TurboWarp" class="poster">
            <span class="card-title">People Playground</span>
        </a>
        
        <a href="./gdash/index.html" class="card" data-name="GD">
            <img src="https://images.ctfassets.net/vfkpgemp7ek3/1204734511/2c0723c100ed8d02a603dfe74597a6cb/geometry-dash-revenue.jpg" alt="Geometry Dash Glow" class="glow">
            <img src="https://images.ctfassets.net/vfkpgemp7ek3/1204734511/2c0723c100ed8d02a603dfe74597a6cb/geometry-dash-revenue.jpg" alt="Geometry Dash" class="poster">
            <span class="card-title">Geometry Dash</span>
        </a>
    </div>

    <div class="row-title">New Releases</div>
    <div class="row" id="new-row">
        </div>

    <div class="row-title">All Games</div>
    <div class="row" id="all-games-row">
        </div>
</div>

<script>
    function search() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-name').toLowerCase();
            cards[i].style.display = name.includes(input) ? "block" : "none";
        }
    }
</script>

</body>
</html>
