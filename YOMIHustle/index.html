<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body style="background-color: black;">
    <script>
        // Temporary testing link (2048) since YOMI Hustle ports get taken down fast
        const gameUrl = "https://ivysly.itch.io/yomihustle";

        function launch() {
            const win = window.open('about:blank', '_blank');
            if (win) {
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                win.document.body.style.background = '#000';
                const ifr = win.document.createElement('iframe');
                ifr.style.border = 'none';
                ifr.style.width = '100%';
                ifr.style.height = '100%';
                ifr.src = gameUrl;
                win.document.body.appendChild(ifr);
                
                // THE FIX: Go back to the dashboard instead of trying to close the tab!
                window.history.back(); 
            } else {
                document.body.innerHTML = "<h2 style='color:white; font-family:sans-serif; text-align:center; margin-top:20%;'>Pop-up Blocked! Click the icon in your address bar to allow.</h2>";
            }
        }
        
        launch();
    </script>
</body>
</html>
