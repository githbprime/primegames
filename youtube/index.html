<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Site - Full YouTube Load</title>

    <!-- Essential scripts to strip "X-Frame-Options" headers client-side -->
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .full-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 999999;
        }
    </style>
</head>
<body>

    <!-- 
      Loading the full YouTube site using the bypass script. 
      Note: Performance may be slower than a standard embed.
    -->
    <iframe 
        is="x-frame-bypass" 
        src="https://www.youtube.com" 
        class="full-frame">
        Your browser doesn't support iframes.
    </iframe>

</body>
</html>
