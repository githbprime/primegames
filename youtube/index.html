<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Site - YouTube</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .header {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #222; display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        input { padding: 8px; width: 250px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; margin-left: 10px; background: #ff0000; color: white; border: none; cursor: pointer; }
        iframe { position: fixed; top: 50px; left: 0; width: 100%; height: calc(100% - 50px); border: none; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="query" placeholder="Search YouTube...">
        <button onclick="doSearch()">Search</button>
    </div>

    <!-- We use yewtu.be because it doesn't block being iframed -->
    <iframe id="vidFrame" src="https://yewtu.be"></iframe>

    <script>
        function doSearch() {
            const q = document.getElementById('query').value;
            if (q) {
                // This builds a search URL for the mirror site
                const url = "https://yewtu.be" + encodeURIComponent(q);
                document.getElementById('vidFrame').src = url;
            }
        }

        document.getElementById('query').addEventListener("keypress", (e) => {
            if (e.key === "Enter") doSearch();
        });
    </script>

</body>
</html>
